<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RagIndex — README</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --accent-color: #38bdf8;
            --secondary-bg: #1e293b;
            --border-color: #334155;
            --link-color: #38bdf8;
            --code-bg: #1e293b;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --accent-color: #0284c7;
            --secondary-bg: #f1f5f9;
            --border-color: #e2e8f0;
            --link-color: #0284c7;
            --code-bg: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-left a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .header-left a:hover {
            text-decoration: underline;
        }

        .theme-toggle {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--border-color);
        }

        h1, h2, h3, h4 {
            color: var(--accent-color);
            margin-top: 2rem;
        }

        h1:first-of-type {
            margin-top: 0;
        }

        a {
            color: var(--link-color);
        }

        code {
            background: var(--code-bg);
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.9em;
            border: 1px solid var(--border-color);
        }

        pre {
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }

        pre code {
            background: none;
            border: none;
            padding: 0;
        }

        blockquote {
            border-left: 4px solid var(--accent-color);
            margin: 1.5rem 0;
            padding: 0.75rem 1rem;
            background: var(--secondary-bg);
            border-radius: 0 0.5rem 0.5rem 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }

        th {
            background: var(--secondary-bg);
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 2rem 0;
        }

        img {
            max-width: 100%;
        }

        ul, ol {
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: 0.3rem;
        }

        .loading {
            text-align: center;
            padding: 4rem 0;
            opacity: 0.6;
        }

        .error {
            text-align: center;
            padding: 2rem;
            color: #ef4444;
        }

        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="header-left">
                <strong>RagIndex</strong>
                <a href="index.html">&larr; Torna all'App</a>
            </div>
            <button class="theme-toggle" id="theme-btn" title="Cambia Tema">
                <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5" />
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
                <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
        </header>

        <div id="content">
            <div class="loading">Caricamento README in corso...</div>
        </div>
    </div>

    <script src="static/js/services/vendor/marked.min.js"></script>
    <script>
        const themeBtn = document.getElementById('theme-btn');
        const body = document.body;
        const sunIcon = themeBtn.querySelector('.icon-sun');
        const moonIcon = themeBtn.querySelector('.icon-moon');

        themeBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            sunIcon.style.display = newTheme === 'light' ? 'none' : 'block';
            moonIcon.style.display = newTheme === 'light' ? 'block' : 'none';
        });

        (async () => {
            const contentEl = document.getElementById('content');
            try {
                const res = await fetch('./README.md');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const md = await res.text();
                contentEl.innerHTML = marked.parse(md);
            } catch (err) {
                contentEl.innerHTML = '<div class="error">Errore nel caricamento del README: ' + err.message + '</div>';
            }
        })();
    </script>
</body>
</html>
